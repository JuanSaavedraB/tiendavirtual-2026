name: Diagnostico Terraform AWS

on:
  workflow_dispatch:

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    environment: main

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      BACKEND_REGION: ${{ vars.BACKEND_REGION || vars.AWS_REGION }}
      BUCKET: ${{ vars.BUCKET }}
      LOCKS: ${{ vars.LOCKS }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'backend-terraform.tfstate' }}
      VPC_ID: ${{ vars.VPC_ID }}
      PUBLIC_SUBNET_IDS_JSON: ${{ vars.PUBLIC_SUBNET_IDS_JSON || '[]' }}
      NOMBRE_SERVICIO: ${{ vars.NOMBRE_SERVICIO }}
      NOMBRE_LOAD_BALANCER: ${{ vars.NOMBRE_LOAD_BALANCER || 'tienda-virtual-alb' }}
      NOMBRE_TARGET_GROUP: ${{ vars.NOMBRE_TARGET_GROUP || 'tg-tienda-virtual' }}
      NOMBRE_EVENT_BUS: ${{ vars.NOMBRE_EVENT_BUS || 'ordenes-bus' }}

    steps:
      - name: Recuperar el código
        uses: actions/checkout@v5

      - name: Configurar credenciales AWS
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set aws_session_token "$AWS_SESSION_TOKEN"
          aws configure set region "$AWS_REGION"

      - name: Ejecutar diagnostico no destructivo
        run: bash scripts/diagnostico_aws.sh
