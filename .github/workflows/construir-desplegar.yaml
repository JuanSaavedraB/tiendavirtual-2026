name: Construir y Desplegar a AWS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      NOMBRE_ROL_IAM: ${{ vars.NOMBRE_ROL_IAM }}
      CREATE_MISSING_PUBLIC_SUBNET_FOR_LAB: ${{ vars.CREATE_MISSING_PUBLIC_SUBNET_FOR_LAB || 'false' }}
      ADDITIONAL_PUBLIC_SUBNET_CIDR_BLOCK: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_CIDR_BLOCK || '172.31.32.0/20' }}
      ADDITIONAL_PUBLIC_SUBNET_AVAILABILITY_ZONE: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_AVAILABILITY_ZONE || 'us-east-1b' }}
      TF_VAR_create_missing_public_subnet_for_lab: ${{ vars.CREATE_MISSING_PUBLIC_SUBNET_FOR_LAB || 'false' }}
      TF_VAR_additional_public_subnet_cidr_block: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_CIDR_BLOCK || '172.31.32.0/20' }}
      TF_VAR_additional_public_subnet_availability_zone: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_AVAILABILITY_ZONE || 'us-east-1b' }}

    steps:
      - name: Recuperar el código
        uses: actions/checkout@v5

      - name: Configurar las credenciales AWS
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set aws_session_token "$AWS_SESSION_TOKEN"
          aws configure set region "$AWS_REGION"

      - name: Verificar las credenciales
        run: aws sts get-caller-identity

      - name: Preparar application.properties
        run: |
          cp src/main/resources/application.properties.example src/main/resources/application.properties
        working-directory: backend-ventas

      - name: Preparar application.properties (logistica)
        run: |
          cp src/main/resources/application.properties.example src/main/resources/application.properties
        working-directory: backend-logistica

      - name: Configurar JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Dar permisos de ejecución a mvnw
        run: |
          chmod +x backend-ventas/mvnw
          chmod +x backend-logistica/mvnw

      - name: Construir Spring Boot app (ventas)
        run: ./mvnw clean package -DskipTests
        working-directory: backend-ventas

      - name: Construir Spring Boot app (logistica)
        run: ./mvnw clean package -DskipTests
        working-directory: backend-logistica

      - name: Construir imagen docker (ventas)
        run: docker build -t tienda-virtual-ventas .
        working-directory: backend-ventas

      - name: Construir imagen docker (logistica)
        run: docker build -t tienda-virtual-logistica .
        working-directory: backend-logistica

      - name: Iniciar Sesión en ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr describe-repositories --repository-names ${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }} || aws ecr create-repository --repository-name ${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }}

      - name: Push Docker images al repositorio compartido
        run: |
          docker tag tienda-virtual-ventas ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }}:ventas-latest
          docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }}:ventas-latest
          docker tag tienda-virtual-logistica ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }}:logistica-latest
          docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }}:logistica-latest

      - name: Build Lambda Functions
        run: |
          pwd
          ls -la serverless/tiendavirtual/packages/funciones/crear-orden
          ls -la serverless/tiendavirtual/packages/funciones/merger

          for fn in crear-orden merger; do
            pushd "serverless/tiendavirtual/packages/funciones/${fn}"
            npm ci
            npm run build
            test -d build
            popd
          done

          test -d serverless/tiendavirtual/packages/funciones/crear-orden/build
          test -d serverless/tiendavirtual/packages/funciones/merger/build

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Instalar cliente MySQL para inicialización RDS
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Inicializar Terraform
        run: terraform init -backend-config "bucket=${{ vars.BUCKET }}" -backend-config "dynamodb_table=${{ vars.LOCKS }}"
        working-directory: iac

      - name: Diagnosticar red AWS
        run: bash scripts/diagnostico_aws.sh

      - name: Importar recursos existentes creados antes del fallo
        run: bash scripts/importar_recursos_existentes.sh

      - name: Aplicar Terraform
        run: |
          terraform apply \
            -var="id_cuenta_aws=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="nombre_rol_iam=${{ vars.NOMBRE_ROL_IAM }}" \
            -var="path_base_servicio=${{ vars.PATH_BASE_SERVICIO || 'api' }}" \
            -var="nombre_repo_ecr=${{ vars.NOMBRE_REPO_ECR || 'tiendavirtual' }}" \
            -var="usuario_base_datos=${{ vars.USUARIO_BASE_DATOS || 'admin' }}" \
            -var="contrasenha_base_datos=${{ secrets.CONTRASENHA_BASE_DATOS }}" \
            -auto-approve
        working-directory: iac

      - name: Forzar nuevo despliegue ECS (ventas y logistica)
        run: |
          aws ecs update-service --cluster tienda-virtual-cluster --service servicio-ventas --force-new-deployment
          aws ecs update-service --cluster tienda-virtual-cluster --service servicio-logistica --force-new-deployment
