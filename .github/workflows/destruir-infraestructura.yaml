name: Destruir Infraestructura AWS

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Escribe DESTRUIR para confirmar'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: main
    if: ${{ inputs.confirm_destroy == 'DESTRUIR' }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      BACKEND_REGION: ${{ vars.BACKEND_REGION || vars.AWS_REGION }}
      BUCKET: ${{ vars.BUCKET }}
      LOCKS: ${{ vars.LOCKS }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'backend-terraform.tfstate' }}
      TF_VAR_region: ${{ vars.AWS_REGION }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'tienda-virtual' }}
      TF_VAR_environment: ${{ vars.ENVIRONMENT || 'main' }}
      TF_VAR_id_cuenta_aws: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_nombre_rol_iam: ${{ vars.NOMBRE_ROL_IAM }}
      TF_VAR_path_base_servicio: ${{ vars.PATH_BASE_SERVICIO }}
      TF_VAR_nombre_cluster_ecs: ${{ vars.NOMBRE_CLUSTER }}
      TF_VAR_familia_tarea_ecs: ${{ vars.FAMILIA_TAREA_ECS }}
      TF_VAR_nombre_repo_ecr: ${{ vars.NOMBRE_REPO_ECR || 'tienda-virtual' }}
      TF_VAR_host_base_datos: ${{ vars.HOST_BASE_DATOS }}
      TF_VAR_nombre_base_datos: ${{ vars.NOMBRE_BASE_DATOS }}
      TF_VAR_usuario_base_datos: ${{ vars.USUARIO_BASE_DATOS }}
      TF_VAR_contrasenha_base_datos: ${{ secrets.CONTRASENHA_BASE_DATOS }}
      TF_VAR_nombre_servicio_ecs: ${{ vars.NOMBRE_SERVICIO }}
      TF_VAR_nombre_load_balancer: ${{ vars.NOMBRE_LOAD_BALANCER || 'tienda-virtual-alb' }}
      TF_VAR_nombre_target_group: ${{ vars.NOMBRE_TARGET_GROUP || 'tg-tienda-virtual' }}
      TF_VAR_nombre_event_bus: ${{ vars.NOMBRE_EVENT_BUS || 'ordenes-bus' }}
      TF_VAR_vpc_id: ${{ vars.VPC_ID }}
      TF_VAR_public_subnet_ids: ${{ vars.PUBLIC_SUBNET_IDS_JSON || '[]' }}
      TF_VAR_create_missing_public_subnet_for_alb: ${{ vars.CREATE_MISSING_PUBLIC_SUBNET_FOR_ALB || 'false' }}
      TF_VAR_additional_public_subnet_cidr_block: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_CIDR_BLOCK || '' }}
      TF_VAR_additional_public_subnet_availability_zone: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_AVAILABILITY_ZONE || '' }}

    steps:
      - name: Recuperar el código
        uses: actions/checkout@v5

      - name: Configurar las credenciales AWS
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set aws_session_token "$AWS_SESSION_TOKEN"
          aws configure set region "$AWS_REGION"

      - name: Verificar las credenciales
        run: aws sts get-caller-identity

      - name: Build Lambda Functions
        run: |
          cd serverless/tiendavirtual/packages/funciones/crear-orden
          npm ci
          npm run build

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Inicializar Terraform
        run: |
          test -n "$BUCKET"
          test -n "$LOCKS"
          test -n "$TF_STATE_KEY"
          test -n "$BACKEND_REGION"
          terraform init \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="dynamodb_table=${LOCKS}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${BACKEND_REGION}"
        working-directory: iac

      - name: Destruir infraestructura con Terraform
        run: terraform destroy -auto-approve
        working-directory: iac
