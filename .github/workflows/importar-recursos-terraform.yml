name: Importar Recursos Terraform

on:
  workflow_dispatch:

jobs:
  importar:
    runs-on: ubuntu-latest
    environment: main

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      BACKEND_REGION: ${{ vars.BACKEND_REGION || vars.AWS_REGION }}
      BUCKET: ${{ vars.BUCKET }}
      LOCKS: ${{ vars.LOCKS }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'backend-terraform.tfstate' }}
      PUBLIC_SUBNET_IDS_JSON: ${{ vars.PUBLIC_SUBNET_IDS_JSON || '[]' }}
      TF_VAR_region: ${{ vars.AWS_REGION }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'tienda-virtual' }}
      TF_VAR_environment: ${{ vars.ENVIRONMENT || 'main' }}
      TF_VAR_id_cuenta_aws: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_nombre_rol_iam: ${{ vars.NOMBRE_ROL_IAM }}
      TF_VAR_path_base_servicio: ${{ vars.PATH_BASE_SERVICIO }}
      TF_VAR_nombre_cluster_ecs: ${{ vars.NOMBRE_CLUSTER }}
      TF_VAR_familia_tarea_ecs: ${{ vars.FAMILIA_TAREA_ECS }}
      TF_VAR_nombre_repo_ecr: ${{ vars.NOMBRE_REPO_ECR || 'tienda-virtual' }}
      TF_VAR_host_base_datos: ${{ vars.HOST_BASE_DATOS }}
      TF_VAR_nombre_base_datos: ${{ vars.NOMBRE_BASE_DATOS }}
      TF_VAR_usuario_base_datos: ${{ vars.USUARIO_BASE_DATOS }}
      TF_VAR_contrasenha_base_datos: ${{ secrets.CONTRASENHA_BASE_DATOS }}
      TF_VAR_nombre_servicio_ecs: ${{ vars.NOMBRE_SERVICIO }}
      TF_VAR_nombre_load_balancer: ${{ vars.NOMBRE_LOAD_BALANCER || 'tienda-virtual-alb' }}
      TF_VAR_nombre_target_group: ${{ vars.NOMBRE_TARGET_GROUP || 'tg-tienda-virtual' }}
      TF_VAR_nombre_event_bus: ${{ vars.NOMBRE_EVENT_BUS || 'ordenes-bus' }}
      TF_VAR_vpc_id: ${{ vars.VPC_ID }}
      TF_VAR_public_subnet_ids: ${{ vars.PUBLIC_SUBNET_IDS_JSON || '[]' }}
      TF_VAR_create_missing_public_subnet_for_alb: ${{ vars.CREATE_MISSING_PUBLIC_SUBNET_FOR_ALB || 'false' }}
      TF_VAR_additional_public_subnet_cidr_block: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_CIDR_BLOCK || '' }}
      TF_VAR_additional_public_subnet_availability_zone: ${{ vars.ADDITIONAL_PUBLIC_SUBNET_AVAILABILITY_ZONE || '' }}

    steps:
      - name: Recuperar el código
        uses: actions/checkout@v5

      - name: Configurar credenciales AWS
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set aws_session_token "$AWS_SESSION_TOKEN"
          aws configure set region "$AWS_REGION"

      - name: Verificar identidad AWS
        run: aws sts get-caller-identity

      - name: Build Lambda Functions
        run: |
          cd serverless/tiendavirtual/packages/funciones/crear-orden
          npm ci
          npm run build

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Inicializar Terraform contra state remoto
        run: |
          test -n "$BUCKET"
          test -n "$LOCKS"
          test -n "$TF_STATE_KEY"
          test -n "$BACKEND_REGION"
          terraform init \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="dynamodb_table=${LOCKS}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${BACKEND_REGION}"
        working-directory: iac

      - name: Importar recursos existentes si faltan en el state
        run: |
          set -euo pipefail

          import_if_missing() {
            local address="$1"
            local id="$2"

            if terraform state list | grep -Fx "$address" >/dev/null 2>&1; then
              echo "Ya existe en state: $address"
              return
            fi

            if [ -z "$id" ] || [ "$id" = "None" ]; then
              echo "No se encontró ID remoto para $address; se omite."
              return
            fi

            terraform import "$address" "$id"
          }

          LOG_GROUP="/ecs/${TF_VAR_nombre_servicio_ecs}"
          LOG_GROUP_NAME="$(aws logs describe-log-groups --log-group-name-prefix "$LOG_GROUP" --region "$AWS_REGION" --query "logGroups[?logGroupName=='$LOG_GROUP'].logGroupName | [0]" --output text 2>/dev/null || true)"
          TG_ARN="$(aws elbv2 describe-target-groups --names "$TF_VAR_nombre_target_group" --region "$AWS_REGION" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)"
          ALB_ARN="$(aws elbv2 describe-load-balancers --names "$TF_VAR_nombre_load_balancer" --region "$AWS_REGION" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || true)"
          EVENT_BUS_NAME="$(aws events describe-event-bus --name "$TF_VAR_nombre_event_bus" --region "$AWS_REGION" --query 'Name' --output text 2>/dev/null || true)"

          import_if_missing 'module.compute.aws_cloudwatch_log_group.ecs_logs' "$LOG_GROUP_NAME"
          import_if_missing 'module.compute.aws_lb_target_group.tg_tienda_virtual' "$TG_ARN"
          import_if_missing 'module.compute.aws_lb.tienda_virtual_load_balancer' "$ALB_ARN"
          import_if_missing 'module.events.aws_cloudwatch_event_bus.ordenes_bus' "$EVENT_BUS_NAME"
        working-directory: iac

      - name: Plan posterior al import
        run: terraform plan
        working-directory: iac
